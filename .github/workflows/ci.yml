name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmodbus-dev pkg-config build-essential

      - name: Build
        run: make

      - name: Smoke test
        run: ./modbus -h
